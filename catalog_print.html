<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>2026 KHFF Supplier Showcase — Print Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A1A2E;--green:#00A878;--green-lt:#E6F7F3;
  --gold:#C9963A;--gold-lt:#FDF4E7;
  --ink:#1A1A2E;--ink-mid:#4A4A6A;--ink-soft:#8888AA;
  --border:#E4E6F0;--bg:#F7F8FC;
  --c-gut:#4A90D9;--c-beauty:#E8788A;--c-metabolic:#E6A817;--c-immunity:#27AE60;
}
body{font-family:'Inter',sans-serif;background:#e8e8e8;color:var(--ink);-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ── PAGE ── */
@page{size:A4 portrait;margin:0}
.page{
  width:210mm;min-height:297mm;background:#fff;
  position:relative;overflow:hidden;
  page-break-after:always;
  margin:0 auto 12px;
  box-shadow:0 4px 24px rgba(0,0,0,.15);
}
.page:last-child{page-break-after:avoid;margin-bottom:0}
@media print{
  body{background:#fff}
  .page{margin:0;box-shadow:none}
}

/* ── COMMON HEADER ── */
.pg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:2px solid var(--navy);
  background:#fff;
}
.pg-header-left{display:flex;align-items:center;gap:10px}
.ph-logo{height:28px;width:auto}
.ph-divider{width:1px;height:22px;background:#ddd}
.ph-right{display:flex;align-items:center;gap:10px}
.ph-tridge{height:13px;width:auto;opacity:.7}
.ph-pagenum{font-size:9px;color:var(--ink-soft);font-weight:600}

/* ── COMMON FOOTER ── */
.pg-footer{
  position:absolute;bottom:0;left:0;right:0;
  padding:7px 16px;background:#f9f9f9;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;
  font-size:8px;color:var(--ink-soft);
}

/* ══════════════════════════════════
   COVER PAGE
══════════════════════════════════ */
.cover{
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  min-height:297mm;
  position:relative;overflow:hidden;
}
.cover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 60% at 50% 110%,rgba(0,168,120,.22) 0%,transparent 65%);
  pointer-events:none;
}
.cover::after{
  content:'';position:absolute;
  top:-80px;right:-80px;
  width:320px;height:320px;
  border-radius:50%;
  background:rgba(0,168,120,.06);
  pointer-events:none;
}
.cover-inner{position:relative;z-index:1;padding:40px}
.cover-logos{display:flex;align-items:center;gap:20px;justify-content:center;margin-bottom:52px}
.cover-logos img.c-khff{height:52px}
.cover-logos img.c-cphi{height:52px}
.cover-logo-divider{width:1px;height:44px;background:rgba(255,255,255,.2)}
.cover-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,168,120,.15);border:1px solid rgba(0,168,120,.35);
  border-radius:20px;padding:5px 16px;
  font-size:10px;font-weight:600;color:var(--green);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:20px;
}
.cover-year{font-size:13px;font-weight:300;color:rgba(255,255,255,.4);letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.cover-title{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:6px}
.cover-title em{color:var(--green);font-style:normal;display:block;font-size:46px}
.cover-sub{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:52px;line-height:1.8}
.cover-stats{display:flex;gap:0;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;margin-bottom:52px}
.cover-stat{padding:16px 28px;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.cover-stat:last-child{border-right:none}
.cs-num{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#fff;line-height:1}
.cs-num span{color:var(--green)}
.cs-label{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.cover-event{
  display:flex;align-items:center;gap:24px;justify-content:center;
  padding:14px 28px;background:rgba(255,255,255,.05);border-radius:10px;
  border:1px solid rgba(255,255,255,.08);
}
.ce-item{text-align:center}
.ce-label{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.ce-value{font-size:11px;font-weight:600;color:rgba(255,255,255,.8)}
.ce-divider{width:1px;height:28px;background:rgba(255,255,255,.1)}
.cover-tridge{
  position:absolute;bottom:20px;right:20px;z-index:1;
  display:flex;align-items:center;gap:6px;
}
.cover-tridge span{font-size:9px;color:rgba(255,255,255,.2)}

/* ══════════════════════════════════
   TABLE OF CONTENTS
══════════════════════════════════ */
.toc-page .pg-body{padding:24px 28px 52px}
.toc-section-title{
  font-size:10px;font-weight:700;color:var(--ink-soft);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.toc-cat-group{margin-bottom:22px}
.toc-cat-heading{
  display:flex;align-items:center;gap:10px;
  margin-bottom:8px;
}
.toc-cat-icon{font-size:20px;line-height:1}
.toc-cat-label{
  font-family:'Playfair Display',serif;
  font-size:15px;font-weight:700;color:var(--navy);
}
.toc-cat-bar{flex:1;height:1px;background:var(--border);margin-left:4px}
.toc-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px 9px 18px;
  border-left:3px solid transparent;
  border-bottom:1px solid var(--border);
}
.toc-item:last-child{border-bottom:none}
.toc-item:hover{background:var(--bg)}
.toc-company-name{
  font-size:13px;font-weight:600;color:var(--ink);
  display:flex;align-items:center;gap:8px;
}
.toc-company-kr{font-size:10px;color:var(--ink-soft);font-weight:400}
.toc-dots-row{display:flex;align-items:center;gap:14px}
.toc-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toc-pagenum{
  font-size:13px;color:var(--ink-soft);font-weight:700;
  flex-shrink:0;min-width:28px;text-align:right;
}

/* ══════════════════════════════════
   ABOUT PAGE
══════════════════════════════════ */
.about-page .pg-body{padding:20px 24px 48px}
.about-hero{
  background:var(--navy);border-radius:10px;
  padding:24px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.about-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 80% 50%,rgba(0,168,120,.12) 0%,transparent 70%);
}
.about-hero-inner{position:relative;z-index:1}
.ah-eyebrow{font-size:9px;font-weight:600;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.ah-title{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:6px;line-height:1.3}
.ah-title em{color:var(--green);font-style:normal}
.ah-sub{font-size:10px;color:rgba(255,255,255,.4);line-height:1.7;max-width:440px}
.about-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.about-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:10px;text-align:center}
.astat-num{font-size:18px;font-weight:700;color:var(--green)}
.astat-label{font-size:8px;color:rgba(255,255,255,.35);margin-top:3px;line-height:1.3}
.about-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.about-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px}
.ac-icon{font-size:20px;margin-bottom:8px}
.ac-title{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:4px}
.ac-desc{font-size:10px;color:var(--ink-mid);line-height:1.6}
.about-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.about-step{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.as-num{width:24px;height:24px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green);margin:0 auto 8px}
.as-title{font-size:10px;font-weight:700;color:var(--navy);margin-bottom:4px}
.as-desc{font-size:9px;color:var(--ink-soft);line-height:1.5}
.about-info{background:var(--bg);border-radius:8px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ai-item label{font-size:8px;font-weight:700;color:var(--ink-soft);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}
.ai-item span{font-size:10px;color:var(--ink)}

/* ══════════════════════════════════
   COMPANY PAGE
══════════════════════════════════ */
.company-page .pg-body{padding:18px 20px 48px}
.company-hero-card{
  background:var(--navy);border-radius:10px;
  padding:20px;display:flex;align-items:center;gap:18px;
  margin-bottom:14px;position:relative;overflow:hidden;
}
.company-hero-card::before{
  content:'';position:absolute;right:-40px;top:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(0,168,120,.07);
}
.chc-logo{
  width:72px;height:72px;border-radius:10px;
  background:#ffffff;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;position:relative;z-index:1;
  box-shadow:0 0 0 1px rgba(255,255,255,.15);
}
.chc-logo img{width:100%;height:100%;object-fit:contain;padding:6px}
.chc-info{position:relative;z-index:1}
.chc-en{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:2px}
.chc-kr{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:10px}
.chc-cats{display:flex;flex-wrap:wrap;gap:5px}
.chc-cat{font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;color:#fff}
.company-bio-box{
  background:var(--bg);border-radius:8px;
  padding:12px 14px;margin-bottom:14px;
  font-size:10px;color:var(--ink-mid);line-height:1.75;
}
.company-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.cert-badge{font-size:9px;padding:2px 8px;border-radius:8px;border:1px solid var(--border);color:var(--ink-soft)}
.company-products-title{
  font-size:10px;font-weight:700;color:var(--navy);
  letter-spacing:.06em;text-transform:uppercase;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:2px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.company-products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cp-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cp-img{width:100%;aspect-ratio:4/3;background:var(--bg);overflow:hidden;position:relative}
.cp-img img{width:100%;height:100%;object-fit:cover}
.cp-img-placeholder{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:4px;
  font-size:9px;color:#ccc;padding:8px;text-align:center;
}
.cp-type-badge{
  position:absolute;top:6px;right:6px;
  font-size:8px;font-weight:700;padding:2px 7px;border-radius:6px;
}
.badge-f{background:#E6F7F3;color:var(--green)}
.badge-r{background:#FDF4E7;color:var(--gold)}
.cp-body{padding:8px}
.cp-cat{font-size:8px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff;display:inline-block;margin-bottom:4px}
.cp-name{font-size:10px;font-weight:700;color:var(--navy);line-height:1.3}

/* ══════════════════════════════════
   CATEGORY SECTION COVER
══════════════════════════════════ */
.cat-cover{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;min-height:297mm;
  position:relative;overflow:hidden;
}
.cat-cover-inner{position:relative;z-index:1;padding:40px;max-width:480px}
.cat-cover-icon{font-size:72px;margin-bottom:24px;display:block}
.cat-cover-section{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;opacity:.6}
.cat-cover-name{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;line-height:1.1;margin-bottom:16px}
.cat-cover-sub{font-size:12px;line-height:1.8;opacity:.55;margin-bottom:36px}
.cat-cover-stats{display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.15);margin-bottom:0}
.cat-cover-stat{padding:14px 28px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.cat-cover-stat:last-child{border-right:none}
.ccs-num{font-size:26px;font-weight:700;line-height:1}
.ccs-label{font-size:9px;opacity:.4;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.cat-cover-tridge{position:absolute;bottom:20px;right:20px;z-index:1;display:flex;align-items:center;gap:6px}
.cat-cover-tridge span{font-size:9px;opacity:.2}

/* ══════════════════════════════════
   PRODUCT PAGES
══════════════════════════════════ */
.products-page .pg-body{padding:14px 20px 44px}
.products-4-grid{display:grid;grid-template-columns:1fr;gap:11px}
.prod-card{
  display:grid;grid-template-columns:100px 1fr;gap:12px;
  background:#fff;border:1px solid var(--border);
  border-radius:9px;overflow:hidden;padding:0;
}
.prod-img-col{background:var(--bg);overflow:hidden;flex-shrink:0}
.prod-img-col img{width:100px;height:100px;object-fit:cover}
.prod-img-placeholder{
  width:100px;height:100px;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:4px;
  font-size:9px;color:#ccc;text-align:center;padding:8px;
}
.prod-info-col{padding:9px 12px 9px 0;display:flex;flex-direction:column;gap:5px}
.prod-eyebrow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prod-cat-tag{font-size:8px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff}
.prod-type{font-size:8px;padding:2px 7px;border-radius:6px}
.prod-name{font-size:12px;font-weight:700;color:var(--navy);line-height:1.25}
.prod-company{font-size:9px;color:var(--ink-soft)}
.prod-divider{height:1px;background:var(--border)}
.prod-desc{font-size:9px;color:var(--ink-mid);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.prod-ingredients{display:flex;flex-wrap:wrap;gap:3px}
.ingr-chip{font-size:8px;padding:2px 6px;border-radius:6px;border:1px solid var(--border);color:var(--ink-soft)}

/* ══════════════════════════════════
   COMPANY PAGE — PRODUCT DETAIL ROWS
══════════════════════════════════ */
.company-prod-rows{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.company-prod-row{
  display:grid;grid-template-columns:80px 1fr;gap:10px;
  background:#fff;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.cpr-img{background:var(--bg);flex-shrink:0}
.cpr-img img{width:80px;height:80px;object-fit:cover;display:block}
.cpr-img-ph{width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#ddd}
.cpr-info{padding:8px 10px 8px 0;display:flex;flex-direction:column;gap:4px}
.cpr-eyebrow{display:flex;align-items:center;gap:5px}
.cpr-cat{font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;color:#fff}
.cpr-type{font-size:8px;padding:2px 6px;border-radius:5px}
.cpr-name{font-size:11px;font-weight:700;color:var(--navy);line-height:1.25}
.cpr-desc{font-size:9px;color:var(--ink-mid);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ══════════════════════════════════
   BACK COVER
══════════════════════════════════ */
.backcover{
  background:var(--navy);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;min-height:297mm;
  position:relative;overflow:hidden;
}
.backcover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,168,120,.15) 0%,transparent 60%);
}
.bc-inner{position:relative;z-index:1;padding:40px;max-width:360px}
.bc-logo{height:48px;margin:0 auto 32px}
.bc-title{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:8px;line-height:1.4}
.bc-title em{color:var(--green);font-style:normal}
.bc-sub{font-size:11px;color:rgba(255,255,255,.4);line-height:1.7;margin-bottom:32px}
.bc-contact-box{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:18px 24px;margin-bottom:24px;
}
.bc-contact-label{font-size:9px;font-weight:600;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.bc-contact-item{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:4px}
.bc-event{font-size:10px;color:rgba(255,255,255,.3);line-height:1.7}
.bc-bottom{position:absolute;bottom:24px;left:0;right:0;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.bc-copyright{font-size:9px;color:rgba(255,255,255,.2)}
</style>
</head>

  "p035":{desc:"Snovv Energy Recharge is a powder stick beverage base combining 4 key energy systems: glucose (instant ATP fuel), electrolytes based on human sweat composition (Na/K/Mg/Ca), 6 vitamins at 100% RDA (B1/B3/B5/B6/B7/C), and OnBOOT™ — BigSomeBio's patented Agastache rugosa extract (Patent No. 10-2538787) for caffeine-free cognitive arousal. WHO ORS-referenced formulation. 10g × 20 sticks, lemon flavor. Global electrolyte powder market at $8.07B (2023), growing to $14.1B by 2030.",ingredients:["Glucose","Electrolytes (Na/K/Mg/Ca, human sweat-referenced)","Vitamin B1/B3/B5/B6/B7 (RDA 100%)","Vitamin C 100mg","OnBOOT™ (Agastache rugosa Extract, Patent 10-2538787)"]},
  "p036":{desc:"RE:WAKE+ is a caffeine-free cognitive energy formula co-developed with RE:BIRTH (pharmacist brand with 150K followers). Features the urea cycle synergy complex (L-Arginine 3,000mg + Citrulline + Ornithine + Aspartate) for clean energy without crashes, plus OnBOOT™ patented Agastache rugosa extract (clinically proven via EEG to reduce drowsiness brain waves and increase alertness/focus within 30 minutes). Taurine + Vitamin B complex (B1/B6/B12) for metabolic energy acceleration. 30g × 14 liquid pouches.",ingredients:["L-Arginine 3,000mg (6,000mg/day)","Taurine 500mg","L-Ornithine HCl 500mg","L-Citrulline (Watermelon Extract) 300mg","OnBOOT™ (Agastache rugosa, Behavioral Sci. IF2.5)","Vitamin B1/B6/B12"]},
  "p037":{desc:"RE:neral is Korea's first premium liquid multi-mineral supplement delivering 7 minerals with 11 MFDS-approved functional claims in a single daily stick. Formula: Calcium 210mg (30% DV) + Magnesium 200mg (63% DV) + Zinc 8mg (94% DV) + Selenium 40μg + Manganese 2mg + Copper 0.4mg + Molybdenum 20μg. Features patent-process calcium oxide (55,000V electrolysis + ultra-high temperature sintering), gluconate magnesium for fast absorption, and 3 supporting ingredients: bamboo salt, Vitamin B6, and iodine. 22g × 30 sticks, lemon flavor. GMP/HACCP certified, pharmacist-designed.",ingredients:["Calcium 210mg (Patent-process Ca Oxide + Ca Citrate)","Magnesium Gluconate 200mg","Zinc 8mg","Selenium 40μg","Manganese 2mg","Copper 0.4mg","Molybdenum 20μg","Bamboo Salt + Vitamin B6 + Iodine"]},
  "p038":{desc:"Kwangdong Healthbio's Morosil + Banaba tablet combines two clinically proven ingredients: (1) Morosil® — MFDS individually approved Moro orange extract (PGI-certified Sicily, 6,500% concentrated, 98.5% desugared) clinically showing -4.2% body weight, -3.8% BMI, -14.2% visceral fat reduction at 6 months (100 subjects, BMI 25-30, 400mg/day); (2) Banaba leaf extract for blood sugar management support. Available as 3,000mg crunch tablet or 2,500mg × 30 melting powder sticks.",ingredients:["Morosil® (Moro Orange Extract, PGI Sicily, 400mg/day)","Banaba Leaf Extract (Corosolic Acid, 6.5mg/day)","Chromium"]},
  "p039":{desc:"Kwangdong's Rosemary & Grapefruit Electrolyte Water Mix (Approval No. 2019-25) is a MFDS-approved skin health ingredient from Monteloeder (Spain). Clinical trial (90 women, 8 weeks) confirmed: increased MED (UV protection), reduced dermis lipid peroxidation (MDA), improved total and net skin elasticity, reduced periorbital wrinkle depth. Features UV protection + electrolyte hydration (Inside-Out Shield). Contains glutathione yeast 100mg + 8 vitamins. Daily dosage: 1.5g.",ingredients:["Rosemary & Grapefruit Extract Complex (Monteloeder, Spain, 2019-25)","Electrolyte Blend (Na/K/Mg/Ca)","Glutathione Yeast 100mg","8-Vitamin Antioxidant Complex"]},
  "p040":{desc:"Kwangdong's Iron Melting Powder uses Lipofer® microencapsulated iron technology — the next-generation iron solution with minimal metallic taste, zero digestive discomfort, and clinically validated superior absorption efficiency. Superior dispersibility in liquid and powder formulations. Clinically validated iron absorption with animal and human studies. Suitable for women's iron supplementation, prenatal/postnatal nutrition, and pediatric/adolescent iron solutions.",ingredients:["Lipofer® Microencapsulated Iron (High Bioavailability)","Vitamin C","Folic Acid","Vitamin B12"]},

  "p043":{desc:"GreenNAG™ by Amicogen is produced via a 100% eco-friendly enzymatic process using proprietary Trichoderma viride AGCC-M41 enzyme — unlike conventional harsh acid (HCl) hydrolysis methods, leaving zero chemical residues. Sourced from 100% domestic Korean red crab shell chitin. Functions: joint and cartilage health promotion, skin moisturization and hydration. Water-soluble white powder, 0.5~1g/day. 100kg MOQ. KMF Halal certified. GMP, FSSC 22000 facility.",ingredients:["N-Acetylglucosamine GreenNAG™ (Enzymatic Process, Zero Chemical Residue)","100% Korean Red Crab Shell Chitin"]},
  "p044":{desc:"Magnesium Feed Liquid from Ilyang Pharmaceutical, a leading Korean pharmaceutical company founded in 1946 with $252M+ annual sales. Provides highly absorbable magnesium in liquid format to support muscle relaxation, nervous system function, energy metabolism, and sleep quality. Exported to Vietnam market. GMP certified manufacturing.",ingredients:["Magnesium (Liquid Formula)","Vitamin B6","Taurine"]},
  "p045":{desc:"A refreshing vitamin C and B complex drink delivering antioxidant protection and sustained energy support. Contains a full B-vitamin spectrum to support cellular energy production and immune function.",ingredients:["Vitamin C (1,000mg)","Vitamin B1","Vitamin B2","Vitamin B6","Vitamin B12","Niacinamide","Pantothenic Acid"]},

  "p047":{desc:"Bicrome Probiotics for Liver Health (NVP-1702) by NVP Healthcare is Korea's first MFDS individually approved probiotic specifically for liver health. Featuring a dual-strain complex of L. plantarum LC27 and B. longum LC67 (NVP-1702), it is clinically proven to help improve both alcoholic and non-alcoholic fatty liver conditions, while also supporting gut health through beneficial bacteria proliferation and harmful bacteria suppression. 500mg × 30 capsules (1-month supply). Refrigerated storage 0–10°C required.",ingredients:["L. plantarum LC27 + B. longum LC67 (NVP-1702, MFDS Approved)","500mg × 1 Capsule / 30 Capsules × 1 Box"]},
  "p048":{desc:"Bicrome Probiotics for Immune Health (NVP-1703) by NVP Healthcare is Korea's first MFDS individually approved probiotic for nasal/immune health. Features L. plantarum IM76 and B. longum IM55 (NVP-1703) — clinically proven to help improve nasal conditions caused by immune hypersensitivity (allergic rhinitis), while also supporting gut health. Available in two formats: 450mg capsule (adults) and 2g sachet format (Bicrome Koko, children-friendly). 30-day supply.",ingredients:["L. plantarum IM76 + B. longum IM55 (NVP-1703, MFDS Approved)","Adult Capsule 450mg × 30 / Children Sachet 2g × 30"]},

  "p051":{desc:"Comfortable World Para-Biotics from Vitech combines para-biotic (heat-killed Lactobacillus) with live probiotic strains for dual gut health action. Vitech specializes in probiotic and lactic acid bacteria R&D, with capabilities across immune enhancement, joint health, skin health, stomach health, respiratory health, and liver health. GMP certified (Jeonju Plant), HACCP certified (Iksan Plant), FSSC 22000 certified.",ingredients:["Para-Biotics (Heat-killed Lactobacillus)","Live Probiotic Strains","Prebiotic FOS","Digestive Enzymes"]},
  "p052":{desc:"Pure Glow Omega-7 from Vitech features palmitoleic acid (omega-7) manufactured at Korea's first LNF facility. Vitech's FSSC 22000 certified scope specifically includes omega-7 production alongside probiotics. Supports skin hydration, mucosal membrane integrity, and cardiovascular health. 7-MEGA™ MFDS individually approved ingredient (2024.6.27). GMP, HACCP, Halal certified.",ingredients:["7-MEGA™ Omega-7 (Palmitoleic Acid, MFDS Approved 2024)","Sea Buckthorn Oil","Vitamin E"]},
  "p053":{desc:"EA Hana Menopause (이알하나 메노포즈) by Cinnamon Lab features ERr731® — a MFDS-approved (Approval No. 2024-17) rhubarb root extract from Switzerland with 70+ years of use in Germany and registered with US FDA NDI and Canada NHP. Korea's smallest menopausal supplement (4.8mm tablet — Korea's first). Clinically improves 11 MRS menopausal indicators within 4 weeks at just 4mg/day (the lowest daily dose among all menopausal functional ingredients). Safe for long-term daily use. Brand ambassador: Korean actress Moon So-ri.",ingredients:["ERr731® (Rhubarb Root Extract, MFDS 2024-17, Swiss-made, 4mg/day)","Vitamin D3 10μg (100% DV)","Vitamin K1 70μg (100% DV)"]},
  "p054":{desc:"EA Hana Plant-based Melatonin (이알하나 식물성 멜라토닌) by Cinnamon Lab offers plant-derived melatonin as a clean-label alternative to synthetic melatonin. Part of Cinnamon Lab's ER Hana women's health brand with philosophy of simple, transparent ingredients and minimal daily dose. Suitable for Southeast Asian markets. Free from synthetic melatonin, supporting regulatory compliance in markets where synthetic melatonin is restricted.",ingredients:["Plant-derived Melatonin","Supporting Sleep Botanicals","Minimal Clean-label Formula"]},
  "p055":{desc:"EA Hana Immunity (이알하나 면역) by Cinnamon Lab is an immune support supplement in the ER Hana brand's daily wellness lineup. Follows the brand's core philosophy: simple formula, transparent ingredients, effective daily health habit. Part of Cinnamon Lab's Southeast Asia-focused export strategy. The brand is led by Bradley Kim (CEO) and Jerry Shin (COO) with a focus on women's specialized health functional foods.",ingredients:["Immune-support Botanical Blend","Vitamin C","Zinc","Functional Health Ingredients"]},
  "p056":{desc:"LAB Fermented Garlic Extract Powder from Hyundai Bioland (KOSDAQ listed, established 1995) uses lactic acid bacteria fermentation to dramatically enhance bioavailability and eliminate harsh garlic odor while retaining potent allicin equivalent activity. Multiple patents registered (Patent 10-1559888, 10-1091833, 10-1670321). GMP certified (Ansan + Osong factories). Targeted for Southeast Asia (Thailand). $10 Million Export Award recipient.",ingredients:["LAB-Fermented Garlic Extract (Patented, Multiple Patents)","Allicin Precursors","Fermentation-Enhanced Bioactives"]},

  "p066":{desc:"Skin Master P.estro Glow Jelly by HL Science is a jelly stick inner beauty product featuring P-estro BL Powder (pomegranate concentrate, MFDS-approved, 6-fold skin improvement) with 3 premium co-ingredients: low-molecular fish collagen, Vitamin C, and elastin hydrolysate. MFDS functions: skin moisturization, UV-induced skin damage protection. 20g × 10 sticks. Portable, easy-to-consume jelly format. Launched February 2026, targeting women aged 20-30.",ingredients:["P-estro BL Powder (Pomegranate Concentrate, MFDS Approved)","Low-Molecular Fish Collagen","Vitamin C","Elastin Hydrolysate"]},

  "p068":{desc:"Collagen Tripeptide GPX-4™ by NewTree (Nutri) is a low-molecular weight collagen peptide produced via proprietary enzymatic hydrolysis from fish skin of Pangasius hypophthalmus. Standardized: total tri-peptide content ≥15%, marker compound Gly-Pro-Hyp (GPH) ≥3%, and GPX (Gly-Pro-X) ≥4%. Average MW below 1,000 Da for rapid systemic absorption. Upon ingestion, GPX-4™ rapidly reaches target areas to stimulate collagen and hyaluronic acid production — improving wrinkles and skin elasticity. Also activates chondrocytes and hair growth signals for joint and hair health.",ingredients:["Collagen Tripeptide GPX-4™ (Total Tripeptide ≥15%, GPH ≥3%, GPX ≥4%)","Gly-Pro-Hydroxyproline (GPH)","Gly-Pro-X tripeptides","Low-MW Fish Skin Collagen (<1,000 Da)"]},

// ── TABLE OF CONTENTS ──
function renderTOC(companyStartPage){
  const catOrder = [
    "Gut Health & Microbiome",
    "Beauty-from-Within",
    "Metabolic & Specialized Care",
    "Immunity & Vitality"
  ];

  // Map each company to its primary category (first product's category)
  const compWithCat = companies.map((comp, i) => {
    const prods = companyProducts(comp.id);
    const cats = [...new Set(prods.map(p => p.category))];
    return { comp, i, cats, primaryCat: cats[0] };
  });

  // Group by category order (a company may appear in multiple cats — use first match)
  const placed = new Set();
  const groups = catOrder.map(cat => {
    const members = compWithCat.filter(x => {
      if (placed.has(x.comp.id)) return false;
      if (x.cats.includes(cat)) { placed.add(x.comp.id); return true; }
      return false;
    });
    return { cat, members };
  });
  // Any unplaced (edge case)
  const rest = compWithCat.filter(x => !placed.has(x.comp.id));

  const groupsHtml = groups.map(({ cat, members }) => {
    if (!members.length) return '';
    const color = catColor(cat);
    const icon = catIcon(cat);
    const rows = members.map(({ comp, i }) => {
      const pg = companyStartPage + i;
      const dots = [...new Set(companyProducts(comp.id).map(p=>p.category))]
        .map(c2 => `<span class="toc-cat-dot" style="background:${catColor(c2)}"></span>`).join('');
      return `<div class="toc-item" style="border-left-color:${color}">
        <div class="toc-company-name">
          ${comp.en}
          <span class="toc-company-kr">${comp.kr}</span>
        </div>
        <div class="toc-dots-row">
          ${dots}
          <span class="toc-pagenum">p.${pg}</span>
        </div>
      </div>`;
    }).join('');
    return `<div class="toc-cat-group">
      <div class="toc-cat-heading">
        <span class="toc-cat-icon">${icon}</span>
        <span class="toc-cat-label" style="color:${color}">${cat}</span>
        <div class="toc-cat-bar"></div>
      </div>
      ${rows}
    </div>`;
  }).join('');

  // Product catalog section — compute start page
  const PRODUCT_SECTION_PG = companyStartPage + companies.length + 1; // +1 for first cat cover

  return `<div class="page toc-page">
    ${header(2)}
    <div class="pg-body">
      <div style="margin-bottom:24px">
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--navy);margin-bottom:4px">Table of Contents</div>
        <div style="font-size:11px;color:var(--ink-soft)">2026 KHFF Supplier Showcase · 25 Companies · 72 Products</div>
      </div>

      <div class="toc-section-title" style="margin-bottom:14px">Section 1 — About This Event</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 18px;border-left:3px solid var(--green);border-bottom:1px solid var(--border);margin-bottom:22px">
        <span style="font-size:13px;font-weight:600;color:var(--ink)">Event Overview · VIP Program · How It Works</span>
        <span style="font-size:13px;font-weight:700;color:var(--ink-soft)">p.3</span>
      </div>

      <div class="toc-section-title" style="margin-bottom:14px">Section 2 — Company Profiles</div>
      ${groupsHtml}

      <div class="toc-section-title" style="margin-bottom:10px;margin-top:4px">Section 3 — Product Catalog</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 18px;border-left:3px solid #888;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:14px">
          <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-mid)"><span class="toc-cat-dot" style="background:#4A90D9"></span>Gut Health</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-mid)"><span class="toc-cat-dot" style="background:#E8788A"></span>Beauty</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-mid)"><span class="toc-cat-dot" style="background:#E6A817"></span>Metabolic</span>
          <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink-mid)"><span class="toc-cat-dot" style="background:#27AE60"></span>Immunity</span>
        </div>
        <span style="font-size:13px;font-weight:700;color:var(--ink-soft)">p.${PRODUCT_SECTION_PG}</span>
      </div>
    </div>
    ${footer()}
  </div>`;
}

  const cats = [...new Set(prods.map(p=>p.category))];
  const catBadges = cats.map(c=>`<span class="chc-cat" style="background:${catColor(c)}">${catIcon(c)} ${c}</span>`).join('');
  const certBadges = (comp.badges||[]).map(b=>`<span class="cert-badge">${b}</span>`).join('');
  const logoFile = comp.logo ? comp.logo.split('/').pop() : '';

  // Product detail rows (all products with image + description)
  const prodRows = prods.map(p=>{
    const detail = PRODUCT_DETAIL[p.id]||{desc:'Details available upon request.',ingredients:[]};
    const type = p.type==="Finished Product";
    const descShort = detail.desc.length > 160 ? detail.desc.slice(0,160)+'…' : detail.desc;
    return `<div class="company-prod-row">
      <div class="cpr-img">
        <img src="./images/products/${p.id}.jpg" alt="${p.nameEn}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:80px;height:80px;object-fit:cover;display:block"/>
        <div class="cpr-img-ph" style="display:none">📦</div>
      </div>
      <div class="cpr-info">
        <div class="cpr-eyebrow">
          <span class="cpr-cat" style="background:${catColor(p.category)}">${catIcon(p.category)} ${p.category}</span>
          <span class="cpr-type ${type?'badge-f':'badge-r'}">${type?'Finished':'Raw'}</span>
        </div>
        <div class="cpr-name">${p.nameEn}</div>
        <div class="cpr-desc">${descShort}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="page company-page">
    ${header(pg)}
    <div class="pg-body">
      <div class="company-hero-card">
        <div class="chc-logo">
          <img src="./images/logo/${logoFile}" alt="${comp.en}" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\"font-size:11px;font-weight:700;color:var(--navy);text-align:center;padding:4px\">${comp.en}</span>'"/>
        </div>
        <div class="chc-info">
          <div class="chc-en">${comp.en}</div>
          <div class="chc-kr">${comp.kr}</div>
          <div class="chc-cats">${catBadges}</div>
        </div>
      </div>
      ${comp.bio ? `<div class="company-bio-box">${comp.bio}${certBadges?`<div class="company-badges">${certBadges}</div>`:''}</div>` : ''}
      <div class="company-products-title">
        <span>Product Lineup</span>
        <span style="font-size:9px;color:var(--ink-soft);font-weight:400">${prods.length} products</span>
      </div>
      <div class="company-prod-rows">${prodRows}</div>
    </div>
    ${footer()}
  </div>`;
}

// ── PRODUCT PAGES — 카테고리 표지 + 4개씩 ──
function renderProductPages(startPg){
  let html = '';
  let pg = startPg;
  const catOrder = ["Gut Health & Microbiome","Beauty-from-Within","Metabolic & Specialized Care","Immunity & Vitality"];

  catOrder.forEach(cat => {
    const catProds = products.filter(p => p.category === cat);
    if(!catProds.length) return;
    const color = catColor(cat);
    const icon = catIcon(cat);
    const catInfo = NEW_CATS[cat] || {};

    // Category cover page
    const catDescMap = {
      "Gut Health & Microbiome": "Probiotics, postbiotics, and microbiome-targeted ingredients for digestive health, immunity, and the gut-brain axis.",
      "Beauty-from-Within": "Marine collagen, pomegranate extracts, PDRN, and inner beauty formulas for skin hydration, elasticity, and anti-aging.",
      "Metabolic & Specialized Care": "Clinically proven ingredients for blood sugar management, body fat reduction, women's health, bone & joint, and weight management.",
      "Immunity & Vitality": "Propolis, red ginseng, curcumin, vitamins, and energy formulas to support immune resilience and daily vitality."
    };
    const finishedCount = catProds.filter(p=>p.type==="Finished Product").length;
    const rawCount = catProds.filter(p=>p.type!=="Finished Product").length;

    html += `<div class="page cat-cover" style="background:${color}">
      <div class="cat-cover-inner" style="color:#fff">
        <span class="cat-cover-icon">${icon}</span>
        <div class="cat-cover-section" style="color:rgba(255,255,255,.6)">Product Category</div>
        <div class="cat-cover-name">${cat}</div>
        <div class="cat-cover-sub">${catDescMap[cat]||''}</div>
        <div class="cat-cover-stats" style="border-color:rgba(255,255,255,.15)">
          <div class="cat-cover-stat" style="border-color:rgba(255,255,255,.1)">
            <div class="ccs-num">${catProds.length}</div>
            <div class="ccs-label">Products</div>
          </div>
          <div class="cat-cover-stat" style="border-color:rgba(255,255,255,.1)">
            <div class="ccs-num">${finishedCount}</div>
            <div class="ccs-label">Finished Goods</div>
          </div>
          <div class="cat-cover-stat">
            <div class="ccs-num">${rawCount}</div>
            <div class="ccs-label">Raw Materials</div>
          </div>
        </div>
      </div>
      <div class="cat-cover-tridge">
        <span style="color:rgba(255,255,255,.25);font-size:9px">Implemented by</span>
        <img src="${TRIDGE_SRC}" style="height:13px;filter:brightness(10);opacity:.25" alt="Tridge"/>
      </div>
    </div>`;
    pg++;

    // Product pages — 4 per page
    for(let i=0; i<catProds.length; i+=4){
      const batch = catProds.slice(i, i+4);
      const cards = batch.map(p=>{
        const comp = getCompany(p.companyId);
        const detail = PRODUCT_DETAIL[p.id]||{desc:'Details available upon request.',ingredients:[]};
        const type = p.type==="Finished Product";
        const ingrs = detail.ingredients.slice(0,4).map(ig=>`<span class="ingr-chip">${ig}</span>`).join('');
        return `<div class="prod-card">
          <div class="prod-img-col">
            <img src="./images/products/${p.id}.jpg" alt="${p.nameEn}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
            <div class="prod-img-placeholder" style="display:none">📦<span>${p.nameEn}</span></div>
          </div>
          <div class="prod-info-col">
            <div class="prod-eyebrow">
              <span class="prod-cat-tag" style="background:${catColor(p.category)}">${catIcon(p.category)} ${p.category}</span>
              <span class="prod-type ${type?'badge-f':'badge-r'}">${type?'Finished Goods':'Raw Material'}</span>
            </div>
            <div class="prod-name">${p.nameEn}</div>
            <div class="prod-company">🏢 ${comp.en}</div>
            <div class="prod-divider"></div>
            <div class="prod-desc">${detail.desc}</div>
            ${ingrs ? `<div class="prod-ingredients">${ingrs}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      html += `<div class="page products-page">
        ${header(pg)}
        <div class="pg-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:16px">${icon}</span>
              <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--navy)">${cat}</div>
            </div>
            <div style="font-size:9px;color:var(--ink-soft)">${i+1}–${Math.min(i+4,catProds.length)} of ${catProds.length} products</div>
          </div>
          <div class="products-4-grid">${cards}</div>
        </div>
        ${footer()}
      </div>`;
      pg++;
    }
  });
  return html;
}

// ── RENDER ALL ──
function render(){
  const COMPANY_START = 4;  // 1:커버, 2:목차, 3:About
  const PRODUCT_START = COMPANY_START + companies.length;

  let html = '';
  html += renderCover();
  html += renderTOC(COMPANY_START);
  html += renderAbout();
  companies.forEach((comp,i) => html += renderCompany(comp, COMPANY_START+i));
  html += renderProductPages(PRODUCT_START);
  html += renderBackCover();

  document.body.innerHTML = html;
}

window.onload = render;
