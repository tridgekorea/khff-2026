<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>2026 KHFF Supplier Showcase — Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1A1A2E; --green:#00A878; --green-lt:#E6F7F3;
  --border:#E4E6F0; --ink-soft:#8888AA; --bg:#F7F8FC;
  --c-gut:#4A90D9; --c-beauty:#E8788A; --c-metabolic:#E6A817; --c-immunity:#27AE60;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#fff;color:var(--navy);-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* 페이지 설정 */
@page{size:A4;margin:0}
.page{width:210mm;min-height:297mm;page-break-after:always;position:relative;overflow:hidden}
.page:last-child{page-break-after:avoid}

/* 공통 헤더 */
.page-header{background:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--navy)}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo-khff{height:32px;width:auto}
.header-divider{width:1px;height:24px;background:#ddd}
.header-logo-cphi{height:32px;width:auto}
.header-logo-tridge{height:14px;width:auto}
.page-num{font-size:10px;color:var(--ink-soft)}

/* 공통 푸터 */
.page-footer{position:absolute;bottom:0;left:0;right:0;padding:8px 20px;background:#f9f9f9;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--ink-soft)}

/* ═══ 커버 페이지 ═══ */
.cover-page{background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:297mm;position:relative;overflow:hidden}
.cover-page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 110%,rgba(0,168,120,.2) 0%,transparent 70%)}
.cover-logos{display:flex;align-items:center;gap:20px;margin-bottom:48px;position:relative;z-index:1}
.cover-logos img.khff{height:56px}
.cover-logos img.cphi{height:56px}
.cover-divider{width:1px;height:48px;background:rgba(255,255,255,.3)}
.cover-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--green);margin-bottom:16px;position:relative;z-index:1}
.cover-title{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px;position:relative;z-index:1}
.cover-title em{color:var(--green);font-style:normal;display:block}
.cover-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:48px;position:relative;z-index:1}
.cover-stats{display:flex;gap:40px;position:relative;z-index:1}
.cover-stat{text-align:center}
.cover-stat-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#fff}
.cover-stat-num span{color:var(--green)}
.cover-stat-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.cover-tridge{position:absolute;bottom:24px;right:24px;z-index:1}
.cover-tridge img{height:18px;opacity:.5}
.cover-date{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.3);z-index:1}

/* ═══ 기업 페이지 ═══ */
.company-page .page-body{padding:20px 20px 40px}
.company-hero{background:var(--navy);border-radius:10px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:20px}
.company-logo-box{width:80px;height:80px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.company-logo-box img{width:100%;height:100%;object-fit:contain;padding:6px}
.company-hero-info h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.company-hero-info .kr{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:10px}
.cat-badges{display:flex;flex-wrap:wrap;gap:6px}
.cat-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;color:#fff}
.company-bio{background:var(--bg);border-radius:8px;padding:14px 16px;margin-bottom:18px;font-size:11px;color:#4A4A6A;line-height:1.7}
.company-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.cert-badge{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--ink-soft)}
.products-section-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.product-mini{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.product-mini-img{width:100%;aspect-ratio:4/3;background:var(--bg);overflow:hidden}
.product-mini-img img{width:100%;height:100%;object-fit:cover}
.product-mini-body{padding:8px}
.product-mini-cat{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;color:#fff;display:inline-block;margin-bottom:4px}
.product-mini-name{font-size:10px;font-weight:600;color:var(--navy);line-height:1.3}
.product-mini-type{font-size:9px;color:var(--ink-soft);margin-top:2px}

/* ═══ 상품 상세 페이지 ═══ */
.product-page .page-body{padding:20px 20px 40px}
.product-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.product-img-main{width:100%;aspect-ratio:4/3;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.product-img-main img{width:100%;height:100%;object-fit:cover}
.product-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:11px;flex-direction:column;gap:8px}
.product-info{display:flex;flex-direction:column;gap:12px}
.product-eyebrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.product-cat-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;color:#fff}
.product-type-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px}
.badge-finished{background:#E6F7F3;color:var(--green)}
.badge-ingredient{background:#FDF4E7;color:#C9963A}
.product-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy);line-height:1.3}
.product-company{font-size:11px;color:var(--ink-soft)}
.product-divider{height:1px;background:var(--border)}
.product-section-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
.product-desc{font-size:11px;color:#4A4A6A;line-height:1.7;background:var(--bg);border-radius:6px;padding:10px 12px}
.product-ingredients{display:flex;flex-wrap:wrap;gap:5px}
.ingr-tag{font-size:10px;padding:3px 9px;border-radius:10px;border:1px solid var(--border);color:#4A4A6A}

@media print{
  body{margin:0}
  .page{page-break-after:always}
  .page:last-child{page-break-after:avoid}
  a{color:inherit;text-decoration:none}
}
</style>
</head>

  "p070":"이너비 글로우앰플/스틱","p071":"이너비 피디알엔 리즈","p072":"BYCORE 피부면역유산균",

const CAT_MAP = {
  "Gut Health & Probiotics":      "Gut Health & Microbiome",
  "Beauty & Skin":                "Beauty-from-Within",
  "Blood Sugar & Metabolic":      "Metabolic & Specialized Care",
  "Weight Management":            "Metabolic & Specialized Care",
  "Women's Health":               "Metabolic & Specialized Care",
  "Bone & Joint":                 "Metabolic & Specialized Care",
  "Energy & Vitality":            "Immunity & Vitality",
  "Immunity & Antioxidant":       "Immunity & Vitality",
  "Anti-inflammation & Curcumin": "Immunity & Vitality",
  "Beauty & Skin / Gut Health":   "Beauty-from-Within",
};

const KR_TYPE = {"Finished Product":"완제품","Raw Ingredient":"원료"};

function newCat(oldCat){ return CAT_MAP[oldCat]||oldCat; }
function catColor(cat){ return (NEW_CATS[cat]||{color:'#888'}).color; }
function catIcon(cat){ return (NEW_CATS[cat]||{icon:'📦'}).icon; }

function getCompany(id){ return companies.find(c=>c.id===id); }
function companyProducts(id){ return products.filter(p=>p.companyId===id); }

// 공통 헤더
function header(pageNum){
  return `<div class="page-header">
    <div class="header-left">
      <img class="header-logo-khff" src="${KHFF_B64}" alt="KHFF"/>
      <div class="header-divider"></div>
      <img class="header-logo-cphi" src="${CPHI_B64}" alt="CPHI"/>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <img class="header-logo-tridge" src="${TRIDGE_B64}" alt="Tridge"/>
      <span class="page-num">p.${pageNum}</span>
    </div>
  </div>`;
}

// 공통 푸터
function footer(){
  return `<div class="page-footer">
    <span>2026 KHFF Supplier Showcase · Confidential</span>
    <span>Organized by Korea Health Functional Food Association · Implemented by Tridge Co., Ltd.</span>
    <span>Seoul COEX · August 25, 2026</span>
  </div>`;
}

// 커버 페이지
function renderCover(){
  return `<div class="page cover-page">
    <div class="cover-logos">
      <img class="khff" src="${KHFF_B64}" alt="KHFF"/>
      <div class="cover-divider"></div>
      <img class="cphi" src="${CPHI_B64}" alt="CPHI Korea"/>
    </div>
    <div class="cover-eyebrow">🇰🇷 Official Buyer Catalog · Korea Health Functional Food</div>
    <div class="cover-title">2026 KHFF<em>Supplier Showcase</em></div>
    <div class="cover-sub">Organized by Korea Health Functional Food Association &nbsp;·&nbsp; Implemented by Tridge Co., Ltd.</div>
    <div class="cover-stats">
      <div class="cover-stat"><div class="cover-stat-num">25</div><div class="cover-stat-label">Companies</div></div>
      <div class="cover-stat"><div class="cover-stat-num">72</div><div class="cover-stat-label">Products</div></div>
      <div class="cover-stat"><div class="cover-stat-num">4</div><div class="cover-stat-label">Categories</div></div>
      <div class="cover-stat"><div class="cover-stat-num">15<span>+</span></div><div class="cover-stat-label">Markets</div></div>
    </div>
    <div class="cover-date">Seoul COEX · August 25, 2026</div>
    <div class="cover-tridge"><img src="${TRIDGE_B64}" alt="Tridge"/></div>
  </div>`;
}

// 기업 페이지
function renderCompany(comp, pageNum){
  const prods = companyProducts(comp.id);
  const cats = [...new Set(prods.map(p=>newCat(p.oldCat)))];
  const catBadges = cats.map(cat=>`<span class="cat-badge" style="background:${catColor(cat)}">${catIcon(cat)} ${cat}</span>`).join('');
  const certBadges = (comp.badges||[]).map(b=>`<span class="cert-badge">${b}</span>`).join('');
  
  const productCards = prods.map(p=>{
    const cat = newCat(p.oldCat);
    const typeTxt = p.type==="Finished Product"?"Finished":"Raw Material";
    return `<div class="product-mini">
      <div class="product-mini-img">
        <img src="./images/products/${p.id}.jpg" alt="${p.nameEn}" onerror="this.parentElement.innerHTML='<div style=\"display:flex;align-items:center;justify-content:center;height:100%;font-size:9px;color:#aaa\">${p.nameEn}</div>'"/>
      </div>
      <div class="product-mini-body">
        <span class="product-mini-cat" style="background:${catColor(cat)}">${catIcon(cat)}</span>
        <div class="product-mini-name">${p.nameEn}</div>
        <div class="product-mini-type">${typeTxt}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="page company-page">
    ${header(pageNum)}
    <div class="page-body">
      <div class="company-hero">
        <div class="company-logo-box">
          <img src="./images/logo/${comp.logo.split('/').pop()}" alt="${comp.en}" onerror="this.parentElement.innerHTML='<span style=\"font-size:11px;color:rgba(255,255,255,.6);text-align:center\">${comp.en}</span>'"/>
        </div>
        <div class="company-hero-info">
          <h2>${comp.en}</h2>
          <div class="kr">${comp.kr}</div>
          <div class="cat-badges">${catBadges}</div>
        </div>
      </div>
      ${comp.bio ? `<div class="company-bio">${comp.bio}${certBadges ? `<div class="company-badges" style="margin-top:8px">${certBadges}</div>` : ''}</div>` : ''}
      <div class="products-section-title">Products (${prods.length})</div>
      <div class="products-grid">${productCards}</div>
    </div>
    ${footer()}
  </div>`;
}

// 상품 상세 페이지
function renderProduct(p, pageNum){
  const comp = getCompany(p.companyId);
  const cat = newCat(p.oldCat);
  const detail = PRODUCT_DETAIL[p.id]||{desc:'Product details available upon request.',ingredients:[]};
  const typeTxt = p.type==="Finished Product"?"Finished Goods":"Raw Material";
  const badgeClass = p.type==="Finished Product"?"badge-finished":"badge-ingredient";
  const ingredientTags = detail.ingredients.map(i=>`<span class="ingr-tag">${i}</span>`).join('');

  return `<div class="page product-page">
    ${header(pageNum)}
    <div class="page-body">
      <div class="product-layout">
        <div>
          <div class="product-img-main">
            <img src="./images/products/${p.id}.jpg" alt="${p.nameEn}" onerror="this.parentElement.innerHTML='<div class=\"product-img-placeholder\">📦<span>${p.nameEn}</span></div>'"/>
          </div>
        </div>
        <div class="product-info">
          <div class="product-eyebrow">
            <span class="product-cat-tag" style="background:${catColor(cat)}">${catIcon(cat)} ${cat}</span>
            <span class="product-type-badge ${badgeClass}">${typeTxt}</span>
          </div>
          <div class="product-title">${p.nameEn}</div>
          <div class="product-company">🏢 ${comp.en} · ${comp.kr}</div>
          <div class="product-divider"></div>
          <div>
            <div class="product-section-label">Product Description</div>
            <div class="product-desc">${detail.desc}</div>
          </div>
          ${detail.ingredients.length ? `<div>
            <div class="product-section-label">Key Ingredients</div>
            <div class="product-ingredients">${ingredientTags}</div>
          </div>` : ''}
          <div style="background:var(--navy);border-radius:8px;padding:12px 16px;text-align:center;margin-top:auto">
            <div style="font-size:10px;font-weight:700;color:var(--green);letter-spacing:.06em">REQUEST VIP MATCHING</div>
            <div style="font-size:9px;color:rgba(255,255,255,.4);margin-top:3px">geonyeop.lim@tridge.com · andrew.kim@tridge.com</div>
          </div>
        </div>
      </div>
    </div>
    ${footer()}
  </div>`;
}

// 전체 렌더링
function render(){
  // 상품에 카테고리 적용
  products.forEach(p=>{ p.category = CAT_MAP[p.oldCat]||p.oldCat; });
  
  let html = renderCover();
  let pageNum = 2;

  // 기업별 페이지 (25개)
  companies.forEach(comp=>{
    html += renderCompany(comp, pageNum++);
  });

  // 상품별 페이지 (72개)
  products.forEach(p=>{
    html += renderProduct(p, pageNum++);
  });

  document.body.innerHTML += html;
}

window.onload = render;
</script>
</body>
